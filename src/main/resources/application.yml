spring:
  application:
    name: todo-service

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jwt:
    secret: ${JWT_SECRET}
    token:
      access-expiration: 1800000    # 30분
      refresh-expiration: 604800000 # 7일

  data:
    redis:
      port: 6379
      host: localhost